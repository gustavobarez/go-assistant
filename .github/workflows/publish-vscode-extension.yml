name: Publish VS Code Extension

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and quality checks
        run: pnpm run compile

  publish:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Check version against Marketplace
        id: version
        shell: bash
        run: |
          PUBLISHER=$(node -p "require('./package.json').publisher")
          NAME=$(node -p "require('./package.json').name")
          EXTENSION_ID="$PUBLISHER.$NAME"
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          MARKETPLACE_VERSION=$(npx @vscode/vsce show "$EXTENSION_ID" --json | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{try{const j=JSON.parse(s);const v=(j.versions&&j.versions[0]&&j.versions[0].version)||j.version||'';process.stdout.write(v);}catch{process.stdout.write('')}})")

          SHOULD_PUBLISH=$(CURRENT_VERSION="$CURRENT_VERSION" MARKETPLACE_VERSION="$MARKETPLACE_VERSION" node -e "const cur=process.env.CURRENT_VERSION||'';const mp=process.env.MARKETPLACE_VERSION||'';const parse=v=>{const m=v.match(/^(\\d+)\\.(\\d+)\\.(\\d+)(?:[-+].*)?$/);return m?[+m[1],+m[2],+m[3]]:null};if(!mp){process.stdout.write('true');process.exit(0)}const a=parse(cur),b=parse(mp);if(!a||!b){process.stdout.write(cur!==mp?'true':'false');process.exit(0)}for(let i=0;i<3;i++){if(a[i]>b[i]){process.stdout.write('true');process.exit(0)}if(a[i]<b[i]){process.stdout.write('false');process.exit(0)}}process.stdout.write('false');")

          echo "extension=$EXTENSION_ID" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "marketplace=$MARKETPLACE_VERSION" >> "$GITHUB_OUTPUT"
          echo "publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"

          if [ "$SHOULD_PUBLISH" = "true" ]; then
            echo "Will publish $EXTENSION_ID: marketplace='${MARKETPLACE_VERSION:-none}' -> current='$CURRENT_VERSION'"
          else
            echo "No publish needed for $EXTENSION_ID: marketplace='${MARKETPLACE_VERSION:-none}', current='$CURRENT_VERSION'"
          fi

      - name: Fail when version is not greater than Marketplace
        if: steps.version.outputs.publish != 'true'
        run: |
          echo "Publish skipped for ${{ steps.version.outputs.extension }}."
          echo "Marketplace version: ${{ steps.version.outputs.marketplace }}"
          echo "Current package.json version: ${{ steps.version.outputs.current }}"
          echo "Set package.json version to a higher value than Marketplace before pushing."
          exit 1

      - name: Fail if VSCE_PAT is missing
        if: steps.version.outputs.publish == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "Secret VSCE_PAT is not configured."
            exit 1
          fi

      - name: Install dependencies
        if: steps.version.outputs.publish == 'true'
        run: pnpm install --frozen-lockfile

      - name: Compile extension
        if: steps.version.outputs.publish == 'true'
        run: pnpm run compile

      - name: Package extension
        if: steps.version.outputs.publish == 'true'
        run: npx @vscode/vsce package --out go-assistant-${{ steps.version.outputs.current }}.vsix

      - name: Publish to VS Code Marketplace
        if: steps.version.outputs.publish == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath go-assistant-${{ steps.version.outputs.current }}.vsix -p "$VSCE_PAT"
